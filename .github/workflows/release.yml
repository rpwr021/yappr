name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: check
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: ./scripts/package_app.sh
      - name: Pick release tag
        id: release_tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "notes=Yappr ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f latest "$GITHUB_SHA"
            git push --force origin refs/tags/latest
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "title=Latest main build" >> "$GITHUB_OUTPUT"
            echo "notes=Automated build from ${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          TITLE: ${{ steps.release_tag.outputs.title }}
          NOTES: ${{ steps.release_tag.outputs.notes }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --latest
            gh release upload "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --clobber
          else
            gh release create "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --title "$TITLE" --notes "$NOTES" --latest
          fi
