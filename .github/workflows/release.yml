name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  YAPPR_RELEASE_LINE: "v0.1"

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: check
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - name: Pick release tag
        id: release_tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "build=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "title=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "notes=Yappr ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            VERSION="${YAPPR_RELEASE_LINE#v}.${GITHUB_RUN_NUMBER}"
            TAG="v${VERSION}"
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
            echo "notes=Automated build ${VERSION} from ${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
      - name: Package app
        env:
          YAPPR_VERSION: ${{ steps.release_tag.outputs.version }}
          YAPPR_BUILD: ${{ steps.release_tag.outputs.build }}
          YAPPR_RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: ./scripts/package_app.sh
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          TITLE: ${{ steps.release_tag.outputs.title }}
          NOTES: ${{ steps.release_tag.outputs.notes }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --latest
            gh release upload "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --clobber
          else
            gh release create "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --title "$TITLE" --notes "$NOTES" --latest
          fi
