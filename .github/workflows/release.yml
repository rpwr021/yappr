name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: ./scripts/package_app.sh
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --clobber
          else
            gh release create "$TAG" dist/release/Yappr-macos-*.zip dist/release/Yappr-macos.zip dist/release/SHA256SUMS dist/release/yappr.rb --title "$TAG" --notes "Yappr $TAG"
          fi
