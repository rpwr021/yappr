[meta]
version = 1

[server]
endpoint = http://127.0.0.1:8089/v1/chat/completions
timeout = 60
port = 8089
manage = true
binary = auto

[model]
repo = google/gemma-4-E2B-it-qat-q4_0-gguf
weights = gemma-4-E2B_q4_0-it.gguf
mmproj = gemma-4-E2B-it-mmproj.gguf
ctx_size = 8192
ngl = 99

[hotkey]
key = right_option

[audio]
device = 
samplerate = 16000
max_seconds = 28
tail_seconds = 0.4
beep_start = none
beep_stop = none

[models]
active = e2b-qat

[model:e2b-qat]
label = Gemma 4 E2B QAT
name = gemma-4-E2B_q4_0-it
repo = google/gemma-4-E2B-it-qat-q4_0-gguf
weights = gemma-4-E2B_q4_0-it.gguf
mmproj = gemma-4-E2B-it-mmproj.gguf
ctx_size = 8192
ngl = 99

[model:e4b-qat]
label = Gemma 4 E4B QAT
name = gemma-4-E4B_q4_0-it
repo = google/gemma-4-E4B-it-qat-q4_0-gguf
weights = gemma-4-E4B_q4_0-it.gguf
mmproj = gemma-4-E4B-it-mmproj.gguf
ctx_size = 8192
ngl = 99

[language]
target = auto
source = auto
options = auto,English,Spanish,French,German,Hindi,Japanese,Chinese,Portuguese,Italian

[chat]
voice = 
rate = 190
context_seconds = 60

[output]
inject = paste

[logging]
enabled = true
path = ~/.yappr/yappr.log

[search]
enabled = true
endpoint = http://127.0.0.1:8888/search
max_results = 5
timeout = 15
